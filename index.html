<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>말랑 홀짝 대결</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="setupView" class="setup-view">
        <div class="setup-copy">
          <p class="eyebrow">Realtime two-player game</p>
          <h1>말랑 홀짝 대결</h1>
          <p class="subcopy">방 이름과 4자리 비밀번호로 친구를 초대해요. 숫자를 숨기고, 홀짝을 맞히며 총 10번 번갈아 겨룹니다.</p>
        </div>

        <section class="panel setup-panel" aria-label="방 만들기와 입장">
          <label>
            닉네임
            <input id="playerNameInput" maxlength="14" placeholder="예: 민지" autocomplete="name" />
          </label>

          <label>
            방 이름
            <input id="roomNameInput" maxlength="24" placeholder="예: candy-room 또는 사탕방" autocomplete="off" />
          </label>

          <label>
            비밀번호
            <input
              id="roomPasswordInput"
              inputmode="numeric"
              maxlength="4"
              placeholder="숫자 4자리"
              autocomplete="off"
            />
          </label>

          <div class="action-row">
            <button id="createRoomButton" class="primary-button" type="button">방 만들기</button>
            <button id="joinRoomButton" class="secondary-button" type="button">방 입장</button>
          </div>

          <p id="setupMessage" class="message" role="status"></p>
        </section>
      </section>

      <section id="gameView" class="game-layout hidden">
        <aside class="score-panel">
          <div>
            <p class="eyebrow">Room</p>
            <div id="roomNameDisplay" class="room-name">-</div>
          </div>

          <div>
            <p class="eyebrow">Scoreboard</p>
            <div class="players" id="playersList"></div>
          </div>

          <button id="leaveButton" class="ghost-button" type="button">나가기</button>
        </aside>

        <section class="panel arena" aria-label="경기장">
          <div class="round-top">
            <div>
              <p class="eyebrow" id="roleLabel">대기 중</p>
              <h2 id="roundTitle">상대가 들어오길 기다리는 중</h2>
            </div>
            <div id="roundCounter" class="round-counter">0/10</div>
          </div>

          <div id="statusNotice" class="notice" role="status"></div>

          <div id="numberControls" class="choice-panel hidden">
            <p>상대에게 보여주지 않을 숫자를 골라요.</p>
            <div id="numberChoices" class="number-grid"></div>
          </div>

          <div id="guessControls" class="choice-panel hidden">
            <p>상대가 고른 숫자가 홀수인지 짝수인지 맞혀보세요.</p>
            <div class="choice-grid">
              <button data-guess="odd" class="choice-button" type="button">홀</button>
              <button data-guess="even" class="choice-button" type="button">짝</button>
            </div>
          </div>

          <div id="choiceStatus" class="choice-status"></div>

          <div id="winnerBanner" class="winner-banner hidden">
            <p id="winnerName"></p>
            <strong id="winnerMessage"></strong>
          </div>

          <button id="nextRoundButton" class="primary-button hidden" type="button">다음 라운드</button>
        </section>
      </section>
    </main>

    <div id="confettiLayer" class="confetti-layer" aria-hidden="true"></div>

    <script type="module" src="./src/firebase-config.js"></script>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
