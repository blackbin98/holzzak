<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>홀짝 대결</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="setupView" class="panel setup-panel">
        <div>
          <p class="eyebrow">Firebase realtime room</p>
          <h1>홀짝 대결</h1>
          <p class="subcopy">두 명이 방 코드로 만나 30초 안에 선택하고 승부를 확인합니다.</p>
        </div>

        <div class="form-grid">
          <label>
            이름
            <input id="playerNameInput" maxlength="14" placeholder="예: 민준" autocomplete="name" />
          </label>
          <label>
            방 코드
            <input id="roomCodeInput" maxlength="6" placeholder="참가할 때 입력" autocomplete="off" />
          </label>
        </div>

        <div class="action-row">
          <button id="createRoomButton" class="primary-button">방 만들기</button>
          <button id="joinRoomButton" class="secondary-button">방 참가</button>
        </div>

        <p id="setupMessage" class="message"></p>
      </section>

      <section id="gameView" class="game-layout hidden">
        <aside class="score-panel">
          <div>
            <p class="eyebrow">Room</p>
            <div id="roomCodeDisplay" class="room-code">------</div>
          </div>
          <div class="players" id="playersList"></div>
          <button id="leaveButton" class="ghost-button">나가기</button>
        </aside>

        <section class="panel arena">
          <div class="round-top">
            <div>
              <p class="eyebrow" id="roleLabel">대기 중</p>
              <h2 id="roundTitle">상대가 들어오길 기다리는 중</h2>
            </div>
            <div id="timer" class="timer">30</div>
          </div>

          <div id="waitingNotice" class="notice">
            두 번째 플레이어가 방 코드로 참가하면 게임이 시작됩니다.
          </div>

          <div id="hostControls" class="choice-panel hidden">
            <p>손에 쥘 숫자를 고르세요.</p>
            <div id="numberChoices" class="number-grid"></div>
          </div>

          <div id="guesserControls" class="choice-panel hidden">
            <p>상대가 고른 숫자가 홀수인지 짝수인지 맞혀보세요.</p>
            <div class="choice-grid">
              <button data-guess="odd" class="choice-button">홀</button>
              <button data-guess="even" class="choice-button">짝</button>
            </div>
          </div>

          <div id="choiceStatus" class="choice-status"></div>

          <div id="winnerBanner" class="winner-banner hidden">
            <p id="winnerName"></p>
            <strong id="winnerMessage"></strong>
          </div>

          <button id="nextRoundButton" class="primary-button hidden">다음 판</button>
        </section>
      </section>
    </main>

    <script type="module" src="./src/firebase-config.js"></script>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
